<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>澄海周边50-100km咖啡店转盘（2025更新版）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 15px; }
        .container { max-width: 100%; margin: 0 auto; }
        h1 { text-align: center; color: #fff; font-size: 1.4em; margin-bottom: 5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .subtitle { text-align: center; color: rgba(255,255,255,0.9); font-size: 0.85em; margin-bottom: 10px; }
        .notice { background: rgba(255,255,255,0.2); border-radius: 8px; padding: 8px; margin-bottom: 15px; color: #fff; font-size: 0.75em; text-align: center; }
        .back-btn { display: inline-block; color: #fff; text-decoration: none; margin-bottom: 10px; font-size: 0.9em; }
        .wheel-section { background: rgba(255,255,255,0.98); border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .wheel-title { text-align: center; margin-bottom: 10px; color: #333; font-size: 1.1em; font-weight: 600; }
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 0 auto; }
        @media (min-width: 375px) { .wheel-container { width: 320px; height: 320px; } }
        @media (min-width: 414px) { .wheel-container { width: 350px; height: 350px; } }
        #wheel-svg { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.23, 1, 0.32, 1); }
        .pointer { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 35px solid #ff4757; z-index: 20; }
        .wheel-center { position: absolute; width: 50px; height: 50px; background: #fff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .spin-btn { display: block; width: 80%; max-width: 200px; margin: 20px auto 0; padding: 14px 20px; font-size: 1.1em; font-weight: bold; color: #fff; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border: none; border-radius: 30px; cursor: pointer; }
        .result { text-align: center; margin-top: 15px; padding: 12px; background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); border-radius: 12px; min-height: 80px; }
        .result-text { font-size: 1.1em; color: #333; font-weight: bold; }
        .result-info { font-size: 0.85em; color: #666; margin-top: 4px; }
        .list-section { background: rgba(255,255,255,0.98); border-radius: 16px; padding: 15px; }
        .list-title { color: #333; margin-bottom: 12px; font-size: 1.1em; font-weight: 600; }
        .cafe-item { background: #f8f9fa; border-radius: 10px; padding: 12px; margin-bottom: 10px; border-left: 3px solid #667eea; }
        .cafe-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .cafe-name { font-weight: 600; color: #333; }
        .new-tag { background: #ff4757; color: #fff; font-size: 0.6em; padding: 1px 4px; border-radius: 3px; margin-left: 4px; vertical-align: middle; }
        .score { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 0.75em; }
        .cafe-info { color: #666; font-size: 0.8em; }
        .cafe-info span { background: rgba(102, 126, 234, 0.1); padding: 2px 6px; border-radius: 6px; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <h1>🎡 澄海周边热门咖啡店</h1>
        <p class="subtitle">50-100公里 · 汕尾·梅州·福建 · 2025版</p>
        <div class="notice">📍 以澄海汽车总站为起点 | ✅ 已更新店铺信息 | 🆕 新增热门海景店</div>
        
        <div class="wheel-section">
            <div class="wheel-title">🎯 点击按钮随机挑选</div>
            <div class="wheel-container">
                <div class="pointer"></div>
                <svg id="wheel-svg" viewBox="0 0 400 400"><g id="wheel-group" transform="translate(200,200)"></g></svg>
                <div class="wheel-center">☕</div>
            </div>
            <button class="spin-btn" onclick="spinWheel()">🎲 开始旋转</button>
            <div class="result" id="result"><div class="result-text">点击上方按钮开始</div></div>
        </div>
        
        <div class="list-section">
            <div class="list-title">🏆 热门咖啡店排行榜（2025更新）</div>
            <div id="cafeList"></div>
        </div>
    </div>

    <script>
        const cafes = [
            { name: "古堡咖啡", region: "汕尾", distance: "~85km", rating: 4.9, feature: "网红海景", desc: "陆丰施公寮村，日销4000+杯，超出片", isNew: false },
            { name: "落日冲浪", region: "汕尾", distance: "~88km", rating: 4.8, feature: "冲浪主题", desc: "红海湾海边路，咖啡街开创者", isNew: false },
            { name: "云卷云书", region: "梅州", distance: "~72km", rating: 4.7, feature: "书香复古", desc: "客天下西路，梅州热门第一", isNew: false },
            { name: "一线咖啡", region: "汕尾", distance: "~88km", rating: 4.7, feature: "海景落地窗", desc: "红海湾，热带沙漠风格", isNew: false },
            { name: "海风咖啡", region: "汕尾", distance: "~85km", rating: 4.6, feature: "蓝白调", desc: "东海镇，海洋蓝白调装修", isNew: false },
            { name: "浮日隐地", region: "汕尾", distance: "~88km", rating: 4.6, feature: "2024新店", desc: "红海湾，露营风海景咖啡", isNew: true },
            { name: "上岛咖啡", region: "梅州", distance: "~75km", rating: 4.5, feature: "简餐", desc: "梅江四路，十多年历史", isNew: false },
            { name: "汐·海景餐厅", region: "汕尾", distance: "~87km", rating: 4.5, feature: "日落海景", desc: "红海湾，2024新开业", isNew: true },
            { name: "凤娜小姐", region: "漳州", distance: "~92km", rating: 4.4, feature: "福建风味", desc: "诏安县，2014年创立", isNew: false },
            { name: "城市绿洲", region: "汕尾", distance: "~85km", rating: 4.4, feature: "森林系", desc: "东海镇，垂直绿植墙", isNew: false },
            { name: "星辰甜品", region: "汕尾", distance: "~85km", rating: 4.3, feature: "星空主题", desc: "东海镇，星空天花板", isNew: false },
            { name: "老街咖啡", region: "汕尾", distance: "~86km", rating: 4.2, feature: "传统手冲", desc: "东海镇，老城区小巷", isNew: false },
            { name: "吸引力", region: "漳州", distance: "~93km", rating: 4.1, feature: "闽南风", desc: "诏安县，本地人气", isNew: false },
            { name: "灯塔咖啡", region: "汕尾", distance: "~89km", rating: 4.1, feature: "灯塔景观", desc: "红海湾，海边灯塔旁", isNew: true },
            { name: " coastal咖啡", region: "汕尾", distance: "~88km", rating: 4.0, feature: "海岸风", desc: "红海湾，2024新开业", isNew: true }
        ];

        const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#43e97b', '#38f9d7', '#fa709a', '#fee140', '#30cfd0', '#a8edea', '#ff9ff3', '#54a0ff', '#5f27cd'];

        function createWheel() {
            const group = document.getElementById('wheel-group');
            const segmentAngle = 360 / cafes.length;
            const radius = 180;
            cafes.forEach((cafe, index) => {
                const startAngle = index * segmentAngle;
                const endAngle = (index + 1) * segmentAngle;
                const startRad = (startAngle - 90) * Math.PI / 180;
                const endRad = (endAngle - 90) * Math.PI / 180;
                const x1 = Math.cos(startRad) * radius, y1 = Math.sin(startRad) * radius;
                const x2 = Math.cos(endRad) * radius, y2 = Math.sin(endRad) * radius;
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', 'M 0 0 L ' + x1 + ' ' + y1 + ' A ' + radius + ' ' + radius + ' 0 ' + (segmentAngle > 180 ? 1 : 0) + ' 1 ' + x2 + ' ' + y2 + ' Z');
                path.setAttribute('fill', colors[index]);
                path.setAttribute('stroke', '#fff');
                path.setAttribute('stroke-width', '2');
                group.appendChild(path);
                const centerAngle = (startAngle + endAngle) / 2 - 90;
                const textX = Math.cos(centerAngle * Math.PI / 180) * radius * 0.68;
                const textY = Math.sin(centerAngle * Math.PI / 180) * radius * 0.68;
                const textGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                textGroup.setAttribute('transform', 'translate(' + textX + ', ' + textY + ') rotate(' + (centerAngle + 90) + ')');
                const chars = cafe.name.split('');
                chars.forEach((char, i) => {
                    const charText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    charText.setAttribute('x', 0);
                    charText.setAttribute('y', -(chars.length * 14 - 14) / 2 + i * 14);
                    charText.setAttribute('text-anchor', 'middle');
                    charText.setAttribute('fill', '#fff');
                    charText.setAttribute('font-size', '12');
                    charText.setAttribute('font-weight', 'bold');
                    charText.textContent = char;
                    textGroup.appendChild(charText);
                });
                group.appendChild(textGroup);
            });
        }

        function createList() {
            const list = document.getElementById('cafeList');
            cafes.forEach((cafe, index) => {
                const item = document.createElement('div');
                item.className = 'cafe-item';
                const newTag = cafe.isNew ? '<span class="new-tag">NEW</span>' : '';
                item.innerHTML = '<div class="cafe-header"><span class="cafe-name">' + (index + 1) + '. ' + cafe.name + newTag + ' <span style="font-size:0.8em;color:#666">' + cafe.region + '</span></span><span class="score">' + cafe.rating + '分</span></div><div class="cafe-info"><span>📍 ' + cafe.distance + '</span><span>⭐ ' + cafe.feature + '</span></div><div style="color:#888;font-size:0.75em;margin-top:4px;">' + cafe.desc + '</div>';
                list.appendChild(item);
            });
        }

        let isSpinning = false;
        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            const wheel = document.getElementById('wheel-svg');
            const result = document.getElementById('result');
            result.innerHTML = '<div class="result-text">🎲 转盘旋转中...</div>';
            const randomIndex = Math.floor(Math.random() * cafes.length);
            const segmentAngle = 360 / cafes.length;
            const totalRotation = 360 * 5 + (360 - (randomIndex * segmentAngle + segmentAngle / 2));
            wheel.style.transform = 'rotate(' + totalRotation + 'deg)';
            setTimeout(() => {
                const selected = cafes[randomIndex];
                const newTag = selected.isNew ? ' 🆕' : '';
                result.innerHTML = '<div class="result-text">🎉 ' + selected.name + newTag + '</div><div class="result-info">' + selected.region + ' · ' + selected.distance + ' · ' + selected.rating + '分<br>' + selected.desc + '</div>';
                isSpinning = false;
            }, 4000);
        }

        createWheel();
        createList();
    </script>
</body>
</html>
