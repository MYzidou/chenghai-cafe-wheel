<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏍 出车转盘</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 15px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: #fff;
            font-size: 1.5em;
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-size: 0.9em;
            margin-bottom: 20px;
        }
        .wheel-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .wheel-card {
            background: rgba(255,255,255,0.98);
            border-radius: 16px;
            padding: 16px 18px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .wheel-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }
        .wheel-card:active {
            transform: translateY(-1px);
        }
        .wheel-icon {
            font-size: 1.8em;
            margin-bottom: 6px;
        }
        .wheel-title {
            font-size: 1.05em;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }
        .wheel-desc {
            font-size: 0.82em;
            color: #666;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        .wheel-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 0.72em;
            color: #888;
        }
        .wheel-meta span {
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 6px;
        }
        .bottom-image {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .bottom-image img {
            width: 80%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><svg style="vertical-align:middle;width:1.3em;height:1.3em" viewBox="0 0 64 64"><circle cx="14" cy="48" r="9" fill="#555" stroke="#333" stroke-width="2"/><circle cx="14" cy="48" r="4" fill="#888"/><circle cx="50" cy="48" r="9" fill="#555" stroke="#333" stroke-width="2"/><circle cx="50" cy="48" r="4" fill="#888"/><path d="M20 48 L26 30 L42 30 L50 48" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/><path d="M26 30 L22 22 L30 20 L32 30Z" fill="#f39c12" stroke="#e67e22" stroke-width="1"/><rect x="30" y="26" width="12" height="4" rx="2" fill="#2c3e50"/><circle cx="36" cy="22" r="3" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/></svg> 出车转盘</h1>
        <p class="subtitle">汕头·澄海·潮州·揭阳·汕尾·梅州</p>

        <div class="wheel-list">
            <a href="coffee.html" class="wheel-card">
                <div class="wheel-icon">☕</div>
                <div class="wheel-title">咖啡店</div>
                <div class="wheel-desc">4 个转盘 · 汕头/澄海/潮州/汕尾/梅州/福建</div>
                <div class="wheel-meta">
                    <span>61 家店</span>
                    <span>4 个转盘</span>
                </div>
            </a>

            <a href="javascript:void(0)" class="wheel-card" style="opacity:0.5; pointer-events:none;">
                <div class="wheel-icon"><svg style="width:1.3em;height:1.3em" viewBox="0 0 64 64"><path d="M32 8 L18 28 L24 28 L12 48 L28 48 L28 56 L36 56 L36 48 L52 48 L40 28 L46 28Z" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/><path d="M32 8 L24 28 L12 48" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/><circle cx="32" cy="6" r="2" fill="#f1c40f"/></svg></div>
                <div class="wheel-title">跑山</div>
                <div class="wheel-desc">暂无路线，后续添加中...</div>
                <div class="wheel-meta">
                    <span>敬请期待</span>
                </div>
            </a>
        </div>

        <div class="bottom-image">
            <img src="12085.jpg" alt="">
        </div>
    </div>
</body>
</html>
