<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>☕ 汕头咖啡店转盘大全</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 400px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: #fff;
            font-size: 1.8em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-size: 0.9em;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-decoration: none;
            color: #333;
            display: block;
            transition: transform 0.2s ease;
        }
        .card:active { transform: scale(0.98); }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .emoji {
            font-size: 2em;
        }
        .card-title {
            font-size: 1.2em;
            font-weight: bold;
            flex: 1;
        }
        .card-desc {
            color: #666;
            font-size: 0.9em;
            line-height: 1.4;
            margin-bottom: 10px;
        }
        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tag {
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.75em;
            font-weight: 500;
        }
        .tag-orange {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            color: #fff;
        }
        .tag-green {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: #fff;
        }
        .tag-purple {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .tag-pink {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
        }
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.8em;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>☕ 咖啡店转盘大全</h1>
        <p class="subtitle">发现身边的好咖啡</p>
        
        <a href="shantou.html" class="card">
            <div class="card-header">
                <span class="emoji">🏙️</span>
                <span class="card-title">汕头市区 TOP20</span>
            </div>
            <div class="card-desc">
                金平区 · 龙湖区<br>
                20家精品咖啡店综合排名
            </div>
            <div class="tags">
                <span class="tag tag-orange">松松咖啡</span>
                <span class="tag tag-orange">CafeOnWarm</span>
            </div>
        </a>
        
        <a href="chenghai-30-60.html" class="card">
            <div class="card-header">
                <span class="emoji">🛵</span>
                <span class="card-title">澄海周边 30-60km</span>
            </div>
            <div class="card-desc">
                避开禁摩区 · 潮州·揭阳·濠江·潮阳<br>
                12家咖啡店，走国道/省道，含实际导航距离
            </div>
            <div class="tags">
                <span class="tag tag-pink">踢桃咖啡</span>
                <span class="tag tag-pink">丁满咖啡</span>
            </div>
        </a>
        
        <a href="chenghai-near.html" class="card">
            <div class="card-header">
                <span class="emoji">🎯</span>
                <span class="card-title">澄海周边 30-70km</span>
            </div>
            <div class="card-desc">
                汕头 · 潮州 · 揭阳<br>
                15家独立精品咖啡馆（无连锁）
            </div>
            <div class="tags">
                <span class="tag tag-green">燕谷咖啡</span>
                <span class="tag tag-green">sogalab</span>
            </div>
        </a>
        
        <a href="chenghai-far.html" class="card">
            <div class="card-header">
                <span class="emoji">🏖️</span>
                <span class="card-title">澄海周边 50-100km</span>
            </div>
            <div class="card-desc">
                汕尾 · 梅州 · 福建<br>
                12家热门咖啡店，含海景网红店
            </div>
            <div class="tags">
                <span class="tag tag-purple">古堡咖啡</span>
                <span class="tag tag-purple">落日冲浪</span>
            </div>
        </a>
        
        <p class="footer">转盘随机挑选 · 发现好咖啡</p>
    </div>
</body>
</html>
