        let currentFilter = 'all';
        let lastDrawIndex = -1;
        let isDrawing = false;

        // 从 localStorage 读取上次抽取记录
        function loadLastDraw() {
            const saved = localStorage.getItem('lateNightLastDraw');
            if (saved) {
                const data = JSON.parse(saved);
                lastDrawIndex = data.index;
                const cafe = cafes[lastDrawIndex];
                document.getElementById('lastDraw').textContent = `上次抽到：TOP${cafe.rank} ${cafe.name}`;
            }
        }

        // 保存抽取记录到 localStorage
        function saveLastDraw(index) {
            lastDrawIndex = index;
            localStorage.setItem('lateNightLastDraw', JSON.stringify({
                index: index,
                time: new Date().toISOString()
            }));
            const cafe = cafes[index];
            document.getElementById('lastDraw').textContent = `上次抽到：TOP${cafe.rank} ${cafe.name}`;
        }

        // 随机抽取（防重复）
        function drawRandom() {
            if (isDrawing) return;
            isDrawing = true;

            const btn = document.getElementById('drawBtn');
            const resultCard = document.getElementById('resultCard');

            btn.disabled = true;
            btn.classList.add('spinning');
            btn.textContent = '🎲 抽取中...';
            resultCard.classList.remove('show');

            // 模拟滚动效果
            let rollCount = 0;
            const maxRolls = 15;
            const rollInterval = setInterval(() => {
                const randomIdx = Math.floor(Math.random() * cafes.length);
                const cafe = cafes[randomIdx];
                btn.textContent = `🎲 ${cafe.name.substring(0, 8)}...`;
                rollCount++;

                if (rollCount >= maxRolls) {
                    clearInterval(rollInterval);
                    finalizeDraw();
                }
            }, 100);
        }

        // 最终抽取结果
        function finalizeDraw() {
            // 防重复逻辑：排除上次抽到的店
            let availableIndices = [];
            for (let i = 0; i < cafes.length; i++) {
                if (i !== lastDrawIndex) {
                    availableIndices.push(i);
                }
            }

            // 如果只剩一家（理论上不会发生），就用全部
            if (availableIndices.length === 0) {
                availableIndices = cafes.map((_, i) => i);
            }

            // 从可用列表中随机选择
            const randomPos = Math.floor(Math.random() * availableIndices.length);
            const selectedIndex = availableIndices[randomPos];
            const cafe = cafes[selectedIndex];

            // 保存记录
            saveLastDraw(selectedIndex);

            // 显示结果
            document.getElementById('resultRank').textContent = `TOP ${cafe.rank}`;
            document.getElementById('resultName').textContent = cafe.name + (cafe.is24h ? ' <span class="tag-small">24小时</span>' : '');
            document.getElementById('resultAddress').textContent = '📍 ' + cafe.address;
            document.getElementById('resultHours').textContent = '🕐 ' + cafe.hours;
            document.getElementById('resultDistance').textContent = cafe.distance;
            document.getElementById('resultPhone').textContent = cafe.phone ? '📞 ' + cafe.phone : '';

            const btn = document.getElementById('drawBtn');
            btn.disabled = false;
            btn.classList.remove('spinning');
            btn.textContent = '🎲 再抽一家';

            document.getElementById('resultCard').classList.add('show');

            // 记录当前抽中的索引，但不自动滚动
            window.currentDrawIndex = selectedIndex;

            isDrawing = false;
        }

        // 点击按钮后滚动到抽中的店
        function scrollToResult() {
            if (window.currentDrawIndex === undefined) return;

            // 先清除所有高亮
            document.querySelectorAll('.coffee-item').forEach(item => {
                item.classList.remove('highlight');
            });

            // 高亮当前抽中的店
            const item = document.getElementById('cafe-item-' + window.currentDrawIndex);
            if (item) {
                item.classList.add('highlight');
                item.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // 渲染列表
        function renderList(filter = 'all') {
            const listEl = document.getElementById('coffeeList');
            let filtered = cafes;

            if (filter === '24h') {
                filtered = cafes.filter(c => c.is24h);
            } else if (filter === 'near') {
                filtered = cafes.filter(c => parseFloat(c.distance) <= 5);
            } else if (filter === 'chaozhou') {
                filtered = cafes.filter(c => c.region === 'chaozhou');
            } else if (filter === 'jieyang') {
                filtered = cafes.filter(c => c.region === 'jieyang');
            }

            listEl.innerHTML = filtered.map((cafe, idx) => {
                const originalIndex = cafes.indexOf(cafe);
                const rankClass = cafe.rank <= 3 ? 'top3' : (cafe.rank <= 10 ? 'top10' : '');
                return `
                    <div class="coffee-item" id="cafe-item-${originalIndex}">
                        <div class="coffee-header">
                            <span class="coffee-rank ${rankClass}">${cafe.rank}</span>
                            <span class="coffee-name">${cafe.name}${cafe.is24h ? '<span class="tag-small">24小时</span>' : ''}</span>
                            <span class="coffee-distance">${cafe.distance}</span>
                        </div>
                        <div class="coffee-address">${cafe.address}</div>
                        <div class="coffee-hours">🕐 ${cafe.hours}</div>
                        ${cafe.phone ? `<div class="coffee-phone">📞 ${cafe.phone}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        // 筛选列表
        function filterList(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderList(type);
        }

        // 初始化
        loadLastDraw();
        renderList();
    </script>
